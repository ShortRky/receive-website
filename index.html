<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TempChat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { background:#111; color:#0f0; font-family:monospace; padding:10px; }
        #messages { height:80vh; overflow-y:auto; white-space:pre-wrap; }
        input { background:#222; color:#0f0; border:1px solid #0f0; padding:5px; width:70%; }
        button { background:#222; color:#0f0; border:1px solid #0f0; padding:5px; }
    </style>
</head>
<body>
    <div id="login">
        <p>Room code:</p>
        <input id="roomInput" placeholder="e.g. XKCD-42">
        <button onclick="join()">Join</button>
        <p id="status"></p>
    </div>
    <div id="chat" style="display:none">
        <div id="messages"></div>
        <input id="msgInput" placeholder="Type..." autofocus>
        <button onclick="send()">Send</button>
        <button onclick="leave()">Leave</button>
    </div>

    <script>
        // ------------------------------------------------------------
        //  CONFIG – only change these if you ever switch brokers
        // ------------------------------------------------------------
        const BROKER_HOST = "broker.hivemq.com";
        const BROKER_WSS_PORT = 1883;          // WebSocket Secure port
        const BROKER_WSS_PATH = "/mqtt";       // standard MQTT WebSocket path
        // ------------------------------------------------------------

        let client;
        let currentRoom;

        function join() {
            currentRoom = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!currentRoom) return;

            // Build the full wss:// URI directly – this is what the browser needs
            const uri = "wss://" + BROKER_HOST + ":" + BROKER_WSS_PORT + BROKER_WSS_PATH;
            const clientId = "receiver-" + Math.random().toString(36).slice(2);

            // Create client with the host/port (it will be overridden by the hosts option)
            client = new Paho.MQTT.Client(BROKER_HOST, BROKER_WSS_PORT, clientId);

            client.onConnectionLost = () => {
                document.getElementById('messages').innerHTML += "<div>--- disconnected ---</div>";
            };

            client.onMessageArrived = (msg) => {
                const text = msg.payloadString;
                const div = document.createElement('div');
                div.textContent = "anon: " + text;
                document.getElementById('messages').appendChild(div);
                // Auto-remove after 5 seconds
                setTimeout(() => div.remove(), 5000);
            };

            // Connect with explicit hosts array – forces wss://
            client.connect({
                hosts: [uri],
                onSuccess: () => {
                    document.getElementById('status').innerText = "Connected!";
                    client.subscribe(currentRoom + "/laptop");
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('chat').style.display = 'block';
                },
                onFailure: (err) => {
                    document.getElementById('status').innerText = "Connection failed: " + err.errorMessage;
                    console.error("Connection failed", err);
                }
            });
        }

        function send() {
            const text = document.getElementById('msgInput').value;
            if (!text || !currentRoom) return;
            const msg = new Paho.MQTT.Message(text);
            msg.destinationName = currentRoom + "/phone";
            client.send(msg);
            document.getElementById('msgInput').value = '';
        }

        function leave() {
            if (client) client.disconnect();
            document.getElementById('chat').style.display = 'none';
            document.getElementById('login').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('status').innerText = '';
        }
    </script>
</body>
</html>
